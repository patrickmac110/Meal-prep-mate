  <script type="importmap">
    {
      "imports": {
        "react": "[https://esm.sh/react@18.2.0](https://esm.sh/react@18.2.0)",
        "react-dom/client": "[https://esm.sh/react-dom@18.2.0/client?deps=react@18.2.0](https://esm.sh/react-dom@18.2.0/client?deps=react@18.2.0)",
        "lucide-react": "[https://esm.sh/lucide-react@0.468.0?deps=react@18.2.0](https://esm.sh/lucide-react@0.468.0?deps=react@18.2.0)"

<body class="bg-slate-50 text-slate-900 select-none">
  <div id="root" class="h-[100dvh] w-full flex flex-col items-stretch overflow-hidden bg-white"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      ChefHat, Refrigerator, Users, ShoppingCart, Clock, Heart,
      ScanBarcode, Camera, Utensils, Trash2, Plus,
      ArrowLeft, Loader2, Check,
      AlertCircle, X, Image as ImageIcon, Sparkles,
      UserCheck, History, User, ThermometerSnowflake,
      Settings, Key, ThumbsDown
    } from 'lucide-react';

    // --- LocalStorage Hooks ---
    const useLocalStorage = (key, initialValue) => {
      const [storedValue, setStoredValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initialValue;
        } catch (error) {
          console.error(error);
          return initialValue;
        }
      });

      const setValue = (value) => {
        try {
          const valueToStore = value instanceof Function ? value(storedValue) : value;
          setStoredValue(valueToStore);
          window.localStorage.setItem(key, JSON.stringify(valueToStore));
        } catch (error) {
          console.error(error);
        }
      };
      return [storedValue, setValue];
    };

    // --- API Helpers ---
    // FIXED: Now uses gemini-1.5-flash for stability and regex for JSON extraction
    const callGemini = async (apiKey, prompt, imageBase64 = null) => {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
      const parts = [{ text: prompt }];
      if (imageBase64) parts.push({ inlineData: { mimeType: "image/jpeg", data: imageBase64 } });

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts }], generationConfig: { responseMimeType: "application/json" } })
        });
        
        if (!response.ok) {
           const errData = await response.json();
           throw new Error(errData.error?.message || `API Error: ${response.status}`);
        }

        const data = await response.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
        console.log("Gemini Raw Response:", text); // Debugging

        // FIXED: Robust JSON extraction
        const jsonMatch = text.match(/\{[\s\S]*\}/);
        if (!jsonMatch) throw new Error("No JSON found in response");
        
        return JSON.parse(jsonMatch[0]);
      } catch (error) {
        console.error("Gemini API Failed:", error);
        return { error: true, message: error.message };
      }
    };

    // --- Shared Components ---
    const LoadingOverlay = ({ message }) => (
      <div className="absolute inset-0 bg-white/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center p-8 animate-fade-in">
        <Loader2 className="w-12 h-12 text-emerald-500 animate-spin mb-4" />
        <p className="text-slate-600 font-medium text-center animate-pulse">{message}</p>
      </div>
    );

    const Modal = ({ isOpen, onClose, children }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[60] flex items-end sm:items-center justify-center bg-black/50 backdrop-blur-sm p-0 sm:p-4 animate-fade-in">
          <div className="bg-white w-full sm:max-w-xl h-[95dvh] sm:h-auto sm:max-h-[90vh] rounded-t-3xl sm:rounded-2xl shadow-2xl overflow-hidden flex flex-col animate-slide-up mx-auto">
            <div className="flex justify-end p-4 absolute right-0 top-0 z-10">
              <button onClick={onClose} className="p-2 bg-white/80 hover:bg-white rounded-full shadow-sm backdrop-blur-md transition-all">
                <X className="w-5 h-5 text-slate-700" />
              </button>
            </div>
            <div className="overflow-y-auto flex-1 bg-slate-50">{children}</div>
          </div>
        </div>
      );
    };

    const ApiKeyModal = ({ isOpen, onSave }) => {
      const [key, setKey] = useState('');
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-6 animate-fade-in">
          <div className="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl space-y-6">
            <div className="text-center">
              <div className="w-16 h-16 bg-gradient-to-tr from-blue-500 to-purple-500 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg shadow-blue-200">
                <Key className="w-8 h-8 text-white" />
              </div>
              <h2 className="text-2xl font-bold text-slate-900">Setup AI Chef</h2>
              <p className="text-slate-500 mt-2">Enter your Gemini API Key to enable features.</p>
            </div>
            <div className="space-y-4">
              <div className="bg-blue-50 p-4 rounded-xl text-sm text-blue-800 flex items-start gap-3">
                <AlertCircle className="w-5 h-5 shrink-0" />
                <div>Get a free key at <a href="[https://aistudio.google.com/app/apikey](https://aistudio.google.com/app/apikey)" target="_blank" className="font-bold underline">Google AI Studio</a>.</div>
              </div>
              <input
                value={key}
                onChange={(e) => setKey(e.target.value)}
                placeholder="AIzaSy..."
                type="password"
                className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none"
              />
              <button
                onClick={() => key.length > 10 && onSave(key)}
                disabled={key.length < 10}
                className="w-full bg-slate-900 text-white font-bold py-4 rounded-xl disabled:opacity-50"
              >
                Start Cooking
              </button>
            </div>
          </div>
        </div>
      );
    };

    // --- VIEWS ---
    const InventoryView = ({ apiKey, inventory, setInventory }) => {
      const [newItem, setNewItem] = useState('');
      const [quantity, setQuantity] = useState(1);
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const fileInputRef = useRef(null);

      const addItem = (e) => {
        e.preventDefault();
        if (!newItem.trim()) return;
        setInventory([...inventory, { id: Math.random().toString(36).substr(2, 9), name: newItem, quantity, addedAt: new Date().toISOString() }]);
        setNewItem(''); setQuantity(1);
      };

      const handleImageUpload = async (e) => {
        if (!e.target.files || e.target.files.length === 0) return;
        setIsAnalyzing(true);
        const files = Array.from(e.target.files);
        const newItems = [];
        for (const file of files) {
          await new Promise(resolve => {
            const reader = new FileReader();
            reader.onloadend = async () => {
              if (!reader.result) { resolve(); return; }
              const base64 = reader.result.replace("data:", "").replace(/^.+,/, "");
              try {
                const prompt = `Analyze this image (fridge/pantry/receipt). List every single food item that you can confidently distinguish individually. 
STRICT RULE: Do not group items. Return JSON: { "items": [{ "name": "Milk", "quantity": 1 }] }`;
                const res = await callGemini(apiKey, prompt, base64);
                if (res?.items) res.items.forEach(i => newItems.push({ id: Math.random().toString(36).substr(2,9), name: i.name, quantity: i.quantity || 1, addedAt: new Date().toISOString() }));
              } catch (err) { console.error(err); }
              resolve();
            };
            reader.readAsDataURL(file);
          });
        }
        setInventory([...inventory, ...newItems]);
        setIsAnalyzing(false);
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      return (
        <div className="w-full p-4 space-y-5 pb-32">
          {isAnalyzing && <LoadingOverlay message="Scanning items..." />}

          <div className="flex items-center justify-between px-1">
            <h2 className="text-2xl font-bold text-slate-900 flex items-center gap-2">
              <Refrigerator className="w-6 h-6 text-emerald-500" /> Pantry
            </h2>
            <span className="text-xs font-bold bg-slate-100 px-3 py-1.5 rounded-full text-slate-500">{inventory.length} items</span>
          </div>

          <div className="grid grid-cols-2 gap-3 w-full">
            <button
              onClick={() => fileInputRef.current?.click()}
              className="flex items-center justify-center gap-2 bg-indigo-50 text-indigo-600 p-4 rounded-xl font-bold text-sm hover:bg-indigo-100 active:scale-[0.98] transition-all"
            >
              <Camera className="w-5 h-5" /> Scan Photos
            </button>
            <button className="flex items-center justify-center gap-2 bg-slate-100 text-slate-400 p-4 rounded-xl font-bold text-sm cursor-not-allowed opacity-60">
              <ScanBarcode className="w-5 h-5" /> Barcode
            </button>
            <input type="file" ref={fileInputRef} className="hidden" accept="image/*" multiple onChange={handleImageUpload} />
          </div>

          <form onSubmit={addItem} className="flex gap-2 w-full">
            <input
              value={newItem}
              onChange={(e) => setNewItem(e.target.value)}
              placeholder="Add item name..."
              className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500"
            />
            <input
              type="number"
              min="1"
              value={quantity}
              onChange={(e) => setQuantity(parseInt(e.target.value))}
              className="w-16 text-center bg-slate-50 border border-slate-200 rounded-xl py-3 focus:outline-none focus:border-emerald-500"
            />
            <button type="submit" className="bg-emerald-500 text-white w-14 rounded-xl flex items-center justify-center active:bg-emerald-600">
              <Plus className="w-6 h-6" />
            </button>
          </form>

          <div className="space-y-3">
            {inventory.length === 0 && (
              <div className="text-center py-12 text-slate-400">
                <Refrigerator className="w-16 h-16 mx-auto mb-4 text-slate-200" />
                <p>Your pantry is empty.</p>
              </div>
            )}
            {inventory.map((item) => (
              <div key={item.id} className="bg-white border border-slate-100 rounded-2xl p-4 flex items-center justify-between shadow-sm w-full">
                <div className="flex items-center gap-4">
                  <div className="bg-emerald-50 text-emerald-600 w-10 h-10 rounded-lg flex items-center justify-center font-bold text-sm">{item.quantity}</div>
                  <div className="font-bold text-slate-700 text-lg">{item.name}</div>
                </div>
                <div className="flex gap-1">
                  <button
                    onClick={() => setInventory(inventory.map(i => i.id === item.id ? { ...i, quantity: Math.max(0, i.quantity - 1) } : i).filter(i => i.quantity > 0))}
                    className="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-xl text-slate-400 hover:text-red-500 font-bold transition-colors"
                  >-</button>
                  <button
                    onClick={() => setInventory(inventory.map(i => i.id === item.id ? { ...i, quantity: i.quantity + 1 } : i))}
                    className="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-xl text-slate-400 hover:text-emerald-500 font-bold transition-colors"
                  >+</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const FamilyView = ({ familyMembers, setFamilyMembers }) => {
      const [name, setName] = useState('');
      const [age, setAge] = useState('');
      const [diet, setDiet] = useState('None');
      const [preferences, setPreferences] = useState('');

      const addMember = (e) => {
        e.preventDefault();
        if (!name) return;
        setFamilyMembers([...familyMembers, { id: Math.random().toString(), name, age, diet, preferences, addedAt: new Date().toISOString() }]);
        setName(''); setAge(''); setPreferences('');
      };

      return (
        <div className="w-full p-4 space-y-5 pb-32">
          <h2 className="text-2xl font-bold text-slate-900 flex items-center gap-2 px-1">
            <Users className="w-6 h-6 text-purple-500" /> Family Profiles
          </h2>

          <form onSubmit={addMember} className="space-y-3 w-full">
            <div className="flex gap-3 w-full">
              <input value={name} onChange={e => setName(e.target.value)} placeholder="Name"
                className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-purple-500 transition-colors" />
              <input value={age} onChange={e => setAge(e.target.value)} placeholder="Age" type="number"
                className="w-20 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-center focus:outline-none focus:border-purple-500 transition-colors" />
            </div>
            <select value={diet} onChange={e => setDiet(e.target.value)}
              className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-700 font-medium focus:outline-none focus:border-purple-500">
              <option value="None">No Diet Restriction</option>
              <option value="Vegan">Vegan</option>
              <option value="Keto">Keto</option>
              <option value="GF">Gluten Free</option>
            </select>
            <input value={preferences} onChange={e => setPreferences(e.target.value)} placeholder="Likes/Dislikes (e.g. 'Loves spicy', 'No cilantro')"
              className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-500" />
            <button className="w-full bg-purple-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-purple-200 active:scale-[0.99] transition-transform">
              Add Profile
            </button>
          </form>

          <div className="space-y-3 w-full pt-2">
            {familyMembers.length === 0 && (
              <div className="text-center py-10 text-slate-400">
                <Users className="w-16 h-16 mx-auto mb-4 text-slate-200" />
                <p>No profiles added yet.</p>
              </div>
            )}
            {familyMembers.map(m => (
              <div key={m.id} className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center w-full">
                <div>
                  <div className="font-bold text-slate-800 text-lg flex items-center gap-2">
                    {m.name}
                    <span className="bg-slate-100 text-slate-500 text-xs px-2 py-0.5 rounded-full font-bold">{m.age}</span>
                  </div>
                  <div className="text-sm text-purple-600 font-medium mt-1">{m.diet}</div>
                  {m.preferences && <div className="text-xs text-slate-400 mt-1 flex items-center gap-1"><ThumbsDown className="w-3 h-3" /> {m.preferences}</div>}
                </div>
                <button onClick={() => setFamilyMembers(familyMembers.filter(f => f.id !== m.id))}
                  className="p-3 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-xl transition-colors">
                  <Trash2 className="w-5 h-5" />
                </button>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const RecipeEngine = ({ apiKey, inventory, family, setSelectedRecipe, history, recipes, setRecipes, favorites, setFavorites }) => {
      const [loading, setLoading] = useState(false);
      const [activeTab, setActiveTab] = useState('generate');
      const [urlInput, setUrlInput] = useState('');
      const [mode, setMode] = useState('Standard');
      const [eaters, setEaters] = useState(family.map(f => f.id));

      const generate = async () => {
        if (inventory.length === 0) {
           alert("Your pantry is empty! Add items first.");
           return;
        }

        setLoading(true);
        try {
          const invStr = inventory.map(i => i.name).join(', ');
          const famStr = family.filter(f => eaters.includes(f.id)).map(f => `${f.name} (${f.diet}, Prefs: ${f.preferences || 'None'})`).join(', ');

          const prompt = `Act as chef. Inventory: [${invStr}]. People: [${famStr}]. Theme/URL: ${urlInput || mode}.
IMPORTANT: Return JSON.
CRITICAL RULE: You MUST return exactly 3 distinct recipe options.
In 'missing_ingredients' list specific items. 'total_amount_needed' field is MANDATORY for missing items.

JSON Structure:
{ "recipes": [{
  "id":"t","name":"...","time":"30m","description":"...",
  "ingredients":[{"item":"Chicken","qty":"2 lbs","have":true}],
  "missing_ingredients":[{"item":"Heavy Cream","total_amount_needed":"1 cup"}],
  "steps":["1"],"dietary_adaptations":"..."
}, { ... }, { ... }] }`;

          const res = await callGemini(apiKey, prompt);
          
          if (res.error) {
             throw new Error(res.message);
          }
          if (res.recipes) {
             setRecipes(res.recipes.map(r => ({ ...r, id: Math.random().toString(36).substr(2, 9) })));
          } else {
             throw new Error("AI did not return recipes.");
          }
        } catch (error) {
          alert("Generation failed: " + error.message);
          console.error(error);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="w-full min-h-full pb-32">
          {loading && <LoadingOverlay message="Designing menu..." />}

          <div className="bg-white px-4 pt-4 pb-2 sticky top-0 z-20 border-b border-slate-50">
            <div className="flex bg-slate-100 rounded-xl p-1 w-full">
              <button onClick={() => setActiveTab('generate')}
                className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition-all ${activeTab === 'generate' ? 'bg-white shadow-sm text-slate-900' : 'text-slate-400'}`}>
                New Ideas
              </button>
              <button onClick={() => setActiveTab('history')}
                className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition-all ${activeTab === 'history' ? 'bg-white shadow-sm text-slate-900' : 'text-slate-400'}`}>
                History
              </button>
            </div>
          </div>

          <div className="p-4 w-full space-y-6">
            {activeTab === 'generate' ? (
              <>
                <div className="space-y-4 w-full">
                  <h2 className="text-xl font-bold text-slate-900 px-1">Configure</h2>

                  <textarea
                    value={urlInput}
                    onChange={e => setUrlInput(e.target.value)}
                    placeholder="What are you craving? (or paste a URL)"
                    className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm min-h-[100px] focus:outline-none focus:border-orange-500 focus:bg-white transition-all"
                  />

                  {family.length > 0 && (
                    <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide w-full">
                      {family.map(m => (
                        <button
                          key={m.id}
                          onClick={() => setEaters(eaters.includes(m.id) ? eaters.filter(id => id !== m.id) : [...eaters, m.id])}
                          className={`flex items-center gap-2 px-4 py-2.5 rounded-full text-sm font-bold border whitespace-nowrap transition-colors ${eaters.includes(m.id) ? 'bg-orange-50 border-orange-200 text-orange-700' : 'bg-white border-slate-200 text-slate-400'}`}
                        >
                          {eaters.includes(m.id) ? <Check className="w-4 h-4" /> : <UserCheck className="w-4 h-4" />} {m.name}
                        </button>
                      ))}
                    </div>
                  )}

                  <div className="flex gap-3 w-full">
                    <select value={mode} onChange={e => setMode(e.target.value)}
                      className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium text-slate-700 focus:outline-none focus:border-orange-500">
                      <option>Standard</option>
                      <option>Quick (30m)</option>
                      <option>Hosting</option>
                      <option>Budget</option>
                    </select>
                    <button onClick={generate} disabled={loading}
                      className="flex-1 bg-gradient-to-r from-orange-500 to-amber-500 text-white font-bold py-3 rounded-xl shadow-lg shadow-orange-200 active:scale-[0.98] transition-transform flex items-center justify-center gap-2 disabled:opacity-50">
                      <Sparkles className="w-5 h-5" /> Generate
                    </button>
                  </div>
                </div>

                <div className="space-y-4 w-full">
                  <h2 className="text-xl font-bold text-slate-900 px-1 mt-2">Suggestions</h2>
                  {recipes.length === 0 && <p className="text-slate-400 px-1 text-sm">Tap generate to get started.</p>}
                  {recipes.map(r => (
                    <div key={r.id}
                      className="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden w-full group active:scale-[0.98] transition-transform"
                      onClick={() => setSelectedRecipe(r)}
                    >
                      {r.imageUrl
                        ? <img src={r.imageUrl} className="h-48 w-full object-cover" />
                        : <div className="h-32 bg-orange-50 flex items-center justify-center"><ChefHat className="text-orange-200 w-12 h-12" /></div>
                      }
                      <div className="p-5">
                        <div className="flex justify-between items-start mb-2">
                          <h3 className="font-bold text-xl text-slate-800 leading-tight">{r.name}</h3>
                        </div>
                        <div className="flex gap-2 mb-3">
                          <span className="text-xs font-bold bg-slate-100 text-slate-600 px-2 py-1 rounded-md flex items-center gap-1">
                            <Clock className="w-3 h-3" /> {r.time}
                          </span>
                          <span className="text-xs font-bold bg-green-50 text-green-700 px-2 py-1 rounded-md flex items-center gap-1">
                            {r.ingredients.length} ingredients
                          </span>
                        </div>
                        <p className="text-sm text-slate-500 line-clamp-2 leading-relaxed">{r.description}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            ) : (
              <div className="space-y-4 w-full">
                {history.length === 0 && <p className="text-center text-slate-400 py-10">No history yet.</p>}
                {history.map(h => (
                  <div key={h.id} className="bg-white p-4 rounded-2xl border border-slate-100 flex gap-4 w-full shadow-sm" onClick={() => setSelectedRecipe(h)}>
                    <div className="w-20 h-20 bg-slate-100 rounded-xl overflow-hidden shrink-0">
                      {h.imageUrl ? <img src={h.imageUrl} className="w-full h-full object-cover" />
                        : <div className="flex items-center justify-center h-full"><ImageIcon className="text-slate-300 w-6 h-6" /></div>}
                    </div>
                    <div>
                      <h3 className="font-bold text-lg text-slate-800">{h.name}</h3>
                      <div className="text-xs text-slate-500 mt-1 flex items-center gap-1">
                        <History className="w-3 h-3" /> {new Date(h.cookedAt).toLocaleDateString()}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    };

    const ShoppingView = ({ list, setList }) => {
      const [newItem, setNewItem] = useState('');
      const addItem = (e) => { e.preventDefault(); if (newItem) setList([...list, { id: Math.random().toString(), name: newItem, checked: false }]); setNewItem(''); };
      const toggle = (id) => setList(list.map(i => i.id === id ? { ...i, checked: !i.checked } : i));

      return (
        <div className="w-full min-h-full pb-32">
          <div className="p-4 space-y-6 w-full">
            <div className="flex items-center justify-between px-1">
              <h2 className="text-2xl font-bold text-slate-900 flex items-center gap-2">
                <ShoppingCart className="w-6 h-6 text-blue-500" /> Shopping List
              </h2>
              <button onClick={() => setList([])} className="text-xs font-bold text-slate-400">Clear</button>
            </div>

            <form onSubmit={addItem} className="flex gap-2 w-full">
              <input value={newItem} onChange={e => setNewItem(e.target.value)} placeholder="Add item..."
                className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500" />
              <button className="bg-blue-500 text-white p-3 rounded-xl active:bg-blue-600"><Plus className="w-6 h-6" /></button>
            </form>

            <div className="space-y-0 w-full">
              {list.length === 0 && <p className="text-center text-slate-400 py-10">List is empty.</p>}
              {list.map(i => (
                <div key={i.id} onClick={() => toggle(i.id)}
                  className={`flex justify-between items-center p-4 border-b border-slate-100 last:border-0 transition-all ${i.checked ? 'opacity-50' : 'bg-white'}`}>
                  <div className="flex items-center gap-4">
                    <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center transition-colors ${i.checked ? 'bg-blue-500 border-blue-500 text-white' : 'border-slate-300'}`}>
                      {i.checked && <Check className="w-4 h-4" />}
                    </div>
                    <span className={`text-lg ${i.checked ? 'line-through text-slate-400' : 'text-slate-800 font-medium'}`}>{i.name}</span>
                  </div>
                  <button onClick={(e) => { e.stopPropagation(); setList(list.filter(x => x.id !== i.id)) }}
                    className="text-slate-300 hover:text-red-500 p-2">
                    <Trash2 className="w-5 h-5" />
                  </button>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    const LeftoversView = ({ leftovers, setLeftovers }) => {
      const [selected, setSelected] = useState(null);

      return (
        <div className="w-full min-h-full pb-32">
          <div className="p-4 space-y-6 w-full">
            <div className="flex items-center justify-between px-1">
              <h2 className="text-2xl font-bold text-slate-900 flex items-center gap-2">
                <ThermometerSnowflake className="w-6 h-6 text-rose-500" /> Fridge
              </h2>
              <span className="text-xs font-bold bg-slate-100 px-3 py-1.5 rounded-full text-slate-500">{leftovers.length} items</span>
            </div>

            <div className="space-y-3 w-full">
              {leftovers.length === 0 && (
                <div className="text-center py-12 text-slate-400">
                  <ThermometerSnowflake className="w-16 h-16 mx-auto mb-4 text-slate-200" />
                  <p>Fridge is empty.</p>
                </div>
              )}
              {leftovers.map(l => (
                <div key={l.id} onClick={() => setSelected(l)}
                  className="bg-white rounded-2xl border border-slate-100 p-4 flex justify-between items-center shadow-sm w-full active:bg-slate-50 transition-colors">
                  <div>
                    <h3 className="font-bold text-lg text-slate-800">{l.name}</h3>
                    <p className="text-xs font-medium text-slate-400 mt-1 flex items-center gap-1">
                      <Clock className="w-3 h-3" />
                      {Math.ceil((new Date(l.expiresAt) - new Date()) / 86400000)} days left
                    </p>
                  </div>
                  <div className="text-xs bg-rose-50 text-rose-600 px-3 py-1.5 rounded-lg font-bold">Eat Me</div>
                </div>
              ))}
            </div>
          </div>

          <Modal isOpen={!!selected} onClose={() => setSelected(null)}>
            {selected && (
              <div className="p-6 space-y-6">
                <h2 className="text-2xl font-bold">{selected.name}</h2>
                <div className="grid grid-cols-2 gap-4">
                  <div className="bg-slate-50 p-4 rounded-2xl">
                    <div className="text-xs font-bold text-slate-400 uppercase mb-2">Storage</div>
                    <p>{selected.tip}</p>
                  </div>
                  <div className="bg-slate-50 p-4 rounded-2xl">
                    <div className="text-xs font-bold text-slate-400 uppercase mb-2">Reheat</div>
                    <p>{selected.reheat}</p>
                  </div>
                </div>
                <button
                  onClick={() => { setLeftovers(leftovers.filter(x => x.id !== selected.id)); setSelected(null); }}
                  className="w-full bg-emerald-500 text-white py-4 rounded-xl font-bold"
                >
                  Eat Portion
                </button>
              </div>
            )}
          </Modal>
        </div>
      );
    };

    // --- Main App ---
    function MealPrepMate() {
      const [view, setView] = useState('dashboard');
      const [apiKey, setApiKey] = useLocalStorage('mpm_api_key', '');

      const [inventory, setInventory] = useLocalStorage('mpm_inventory', []);
      const [family, setFamily] = useLocalStorage('mpm_family', []);
      const [shoppingList, setShoppingList] = useLocalStorage('mpm_list', []);
      const [leftovers, setLeftovers] = useLocalStorage('mpm_leftovers', []);
      const [favorites, setFavorites] = useLocalStorage('mpm_favorites', []);
      const [history, setHistory] = useLocalStorage('mpm_history', []);
      const [recipes, setRecipes] = useLocalStorage('mpm_recipes_cache', []);

      const [selectedRecipe, setSelectedRecipe] = useState(null);
      const [imageLoading, setImageLoading] = useState(false);
      const [isCookedState, setIsCookedState] = useState(false);

      useEffect(() => { if (selectedRecipe) setIsCookedState(false); }, [selectedRecipe]);

      // Enhanced Image Generation
      useEffect(() => {
        if (selectedRecipe && !selectedRecipe.imageUrl && !imageLoading) {
          const run = async () => {
            setImageLoading(true);
            const descriptionPrompt = `Describe a professional food photo of "${selectedRecipe.name}" in 15 words. Mention lighting and plating.`;
            let visualPrompt = selectedRecipe.name;
            try {
              const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
              const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: descriptionPrompt }] }] })
              });
              const data = await response.json();
              visualPrompt = data.candidates?.[0]?.content?.parts?.[0]?.text || selectedRecipe.name;
            } catch (e) { console.error(e); }

            const encodedPrompt = encodeURIComponent(visualPrompt);
            const seed = Math.floor(Math.random() * 1000);
            const imgUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=800&height=600&seed=${seed}&nologo=true&model=flux`;

            const update = (list, set) => { if (list.some(i => i.id === selectedRecipe.id)) set(list.map(i => i.id === selectedRecipe.id ? { ...i, imageUrl: imgUrl } : i)); };
            update(favorites, setFavorites);
            update(history, setHistory);
            update(recipes, setRecipes);

            setSelectedRecipe(prev => ({ ...prev, imageUrl: imgUrl }));
            setImageLoading(false);
          };
          run();
        }
      }, [selectedRecipe]);

      const handleAddLeftover = async (name) => {
        const id = Math.random().toString(36).substr(2, 9);
        try {
          const res = await callGemini(apiKey, `Storage for "${name}". JSON: { "tip": "...", "days": 3, "reheat": "..." }`);
          const exp = new Date(); exp.setDate(exp.getDate() + (res?.days || 3));
          setLeftovers([...leftovers, { id, name, tip: res?.tip || "Refrigerate", reheat: res?.reheat || "Heat well", expiresAt: exp.toISOString(), addedAt: new Date().toISOString() }]);
          alert("Saved to fridge!");
        } catch(e) { alert("Saved (offline mode)"); }
      };

      const markAsCooked = () => {
        const { id, ...data } = selectedRecipe;
        setHistory([{ ...data, id: Math.random().toString(36), cookedAt: new Date().toISOString() }, ...history]);
        setIsCookedState(true);
      };

      const Dashboard = () => (
        <div className="w-full p-4 space-y-4 animate-fade-in pb-32">
          <div className="bg-gradient-to-br from-emerald-600 to-teal-800 text-white p-6 rounded-[2rem] shadow-xl relative overflow-hidden w-full">
            <div className="relative z-10">
              <h1 className="text-3xl font-bold mb-1">Hi, Chef!</h1>
              <p className="text-emerald-100 text-sm mb-6">{inventory.length} items in pantry. {leftovers.length} leftovers.</p>
              <div className="flex gap-3">
                <button onClick={() => setView('recipes')}
                  className="flex-1 bg-white/20 backdrop-blur-md p-3.5 rounded-2xl flex items-center justify-center gap-2 font-bold text-sm active:scale-95 transition-transform">
                  <Sparkles className="w-4 h-4" /> Plan Meal
                </button>
                <button onClick={() => setView('inventory')}
                  className="flex-1 bg-white text-emerald-900 p-3.5 rounded-2xl flex items-center justify-center gap-2 font-bold text-sm active:scale-95 transition-transform">
                  <Plus className="w-4 h-4" /> Add Items
                </button>
              </div>
            </div>
            <ChefHat className="absolute -right-6 -bottom-6 w-40 h-40 text-white/10 rotate-12" />
          </div>

          <div className="grid grid-cols-2 gap-4 w-full">
            <div onClick={() => setView('shopping')}
              className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 active:scale-[0.98] transition-transform">
              <div className="bg-blue-50 w-12 h-12 rounded-2xl flex items-center justify-center mb-3 text-blue-500">
                <ShoppingCart className="w-6 h-6" />
              </div>
              <div className="font-bold text-lg text-slate-800">Shopping</div>
              <div className="text-xs text-slate-400 mt-1">{shoppingList.filter(i => !i.checked).length} items</div>
            </div>

            <div onClick={() => setView('favorites')}
              className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 active:scale-[0.98] transition-transform">
              <div className="bg-red-50 w-12 h-12 rounded-2xl flex items-center justify-center mb-3 text-red-500">
                <Heart className="w-6 h-6" />
              </div>
              <div className="font-bold text-lg text-slate-800">Favorites</div>
              <div className="text-xs text-slate-400 mt-1">{favorites.length} saved</div>
            </div>
          </div>

          <div onClick={() => setView('leftovers')}
            className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex items-center justify-between active:scale-[0.98] transition-transform">
            <div className="flex items-center gap-4">
              <div className="bg-rose-50 w-12 h-12 rounded-2xl flex items-center justify-center text-rose-500">
                <ThermometerSnowflake className="w-6 h-6" />
              </div>
              <div>
                <div className="font-bold text-lg text-slate-800">Fridge</div>
                <div className="text-xs text-slate-400 mt-1">{leftovers.length} leftovers</div>
              </div>
            </div>
            <ArrowLeft className="w-5 h-5 text-slate-300 rotate-180" />
          </div>
        </div>
      );

      const NavBtn = ({ icon: Icon, label, active, onClick }) => (
        <button onClick={onClick} className={`flex flex-col items-center gap-1 w-full py-2 transition-colors ${active ? 'text-emerald-600' : 'text-slate-400'}`}>
          <Icon className="w-6 h-6" />
          <span className="text-[10px] font-bold">{label}</span>
        </button>
      );

      return (
        /* KEY FIX: w-full (no shrink-to-fit), fills the viewport consistently */
        <div className="w-full h-[100dvh] flex flex-col relative bg-white overflow-hidden">
          <ApiKeyModal isOpen={!apiKey} onSave={setApiKey} />

          {/* Header */}
          <div className="flex-none bg-white/90 backdrop-blur-md px-5 py-3 flex justify-between items-center border-b border-slate-100 z-30 sticky top-0">
            {view !== 'dashboard'
              ? <button onClick={() => setView('dashboard')} className="p-2 -ml-2 rounded-full hover:bg-slate-100 active:bg-slate-200">
                  <ArrowLeft className="w-6 h-6 text-slate-700" />
                </button>
              : <div className="flex items-center gap-2">
                  <div className="bg-emerald-500 p-1.5 rounded-lg"><ChefHat className="w-5 h-5 text-white" /></div>
                  <span className="font-bold text-xl tracking-tight text-slate-800">MealPrepMate</span>
                </div>
            }
            <div className="flex gap-1">
              <button onClick={() => setView('family')} className="p-2 rounded-full hover:bg-slate-100 text-slate-600">
                <User className="w-6 h-6" />
              </button>
              <button onClick={() => { if (confirm("Clear all data and reset app?")) { localStorage.clear(); window.location.reload(); } }}
                className="p-2 rounded-full hover:bg-slate-100 text-slate-600">
                <Settings className="w-6 h-6" />
              </button>
            </div>
          </div>

          {/* Scrollable Content */}
          <div className="flex-1 overflow-y-auto scrollbar-hide w-full relative bg-white">
            {view === 'dashboard' && <Dashboard />}
            {view === 'inventory' && <InventoryView apiKey={apiKey} inventory={inventory} setInventory={setInventory} />}
            {view === 'family' && <FamilyView familyMembers={family} setFamilyMembers={setFamily} />}
            {view === 'recipes' && <RecipeEngine apiKey={apiKey} inventory={inventory} family={family} setSelectedRecipe={setSelectedRecipe} history={history} recipes={recipes} setRecipes={setRecipes} favorites={favorites} setFavorites={setFavorites} />}
            {view === 'shopping' && <ShoppingView list={shoppingList} setList={setShoppingList} />}
            {view === 'leftovers' && <LeftoversView leftovers={leftovers} setLeftovers={setLeftovers} />}
            {view === 'favorites' && (
              <div className="w-full p-4 space-y-4 pb-32">
                <h2 className="text-2xl font-bold mb-2 px-1">Saved Recipes</h2>
                {favorites.map(r => (
                  <div key={r.id} onClick={() => setSelectedRecipe(r)}
                    className="bg-white border border-slate-100 shadow-sm p-3 rounded-2xl flex gap-4 w-full active:bg-slate-50">
                    <div className="w-24 h-24 bg-slate-100 rounded-xl overflow-hidden shrink-0">
                      {r.imageUrl && <img src={r.imageUrl} className="w-full h-full object-cover" />}
                    </div>
                    <div className="py-1">
                      <div className="font-bold text-lg leading-tight mb-1">{r.name}</div>
                      <div className="text-xs text-slate-500 bg-slate-100 inline-block px-2 py-1 rounded-md">{r.time}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Bottom Nav (KEY FIX: fixed to viewport full width) */}
          <div className="fixed bottom-0 left-0 right-0 w-full bg-white border-t border-slate-100 px-6 pb-safe pt-2 z-40 rounded-t-3xl shadow-[0_-5px_10px_rgba(0,0,0,0.02)]">
            <div className="flex justify-between items-end pb-2">
              <NavBtn icon={ChefHat} label="Home" active={view === 'dashboard'} onClick={() => setView('dashboard')} />
              <NavBtn icon={Utensils} label="Plan" active={view === 'recipes'} onClick={() => setView('recipes')} />
              <div className="relative -top-6 px-2">
                <button onClick={() => setView('inventory')}
                  className="w-16 h-16 bg-gradient-to-tr from-emerald-400 to-emerald-600 rounded-full text-white flex items-center justify-center shadow-xl shadow-emerald-200 hover:scale-105 active:scale-95 transition-transform">
                  <ScanBarcode className="w-7 h-7" />
                </button>
              </div>
              <NavBtn icon={ShoppingCart} label="Shop" active={view === 'shopping'} onClick={() => setView('shopping')} />
              <NavBtn icon={ThermometerSnowflake} label="Fridge" active={view === 'leftovers'} onClick={() => setView('leftovers')} />
            </div>
          </div>

          {/* Recipe Modal */}
          <Modal isOpen={!!selectedRecipe} onClose={() => setSelectedRecipe(null)}>
            {selectedRecipe && (
              <div className="bg-white min-h-full pb-10">
                <div className="w-full h-72 bg-slate-100 relative flex items-center justify-center overflow-hidden group">
                  {selectedRecipe.imageUrl
                    ? <img src={selectedRecipe.imageUrl} className="w-full h-full object-cover animate-fade-in group-hover:scale-105 transition-transform duration-700" />
                    : <Loader2 className="w-8 h-8 animate-spin text-slate-400" />
                  }
                  <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                  <div className="absolute bottom-0 left-0 right-0 p-6">
                    <h2 className="text-white text-3xl font-bold leading-tight shadow-black drop-shadow-md mb-2">{selectedRecipe.name}</h2>
                    <div className="flex gap-3">
                      <span className="bg-white/20 backdrop-blur-md px-3 py-1 rounded-full text-white text-sm font-bold flex items-center gap-1 border border-white/10">
                        <Clock className="w-4 h-4" /> {selectedRecipe.time}
                      </span>
                      <button onClick={() => { setFavorites([...favorites, { ...selectedRecipe, id: Math.random().toString() }]); alert("Saved!"); }}
                        className="bg-white/20 backdrop-blur-md px-3 py-1 rounded-full text-white text-sm font-bold flex items-center gap-1 border border-white/10 active:bg-white/30">
                        <Heart className="w-4 h-4 fill-current" /> Save
                      </button>
                    </div>
                  </div>
                </div>

                <div className="p-6 space-y-8">
                  <p className="text-slate-600 leading-relaxed text-lg font-serif italic border-l-4 border-emerald-200 pl-4">{selectedRecipe.description}</p>

                  <div>
                    <h3 className="font-bold mb-4 flex items-center gap-2 text-xl text-slate-800">
                      <Check className="w-6 h-6 text-emerald-500" /> You Have
                    </h3>
                    <div className="bg-emerald-50/50 rounded-2xl p-1 border border-emerald-100">
                      {selectedRecipe.ingredients?.map((i, idx) => (
                        <div key={idx} className="flex justify-between items-center p-3 border-b border-emerald-100 last:border-0 hover:bg-emerald-50 rounded-xl transition-colors">
                          <span className="font-medium text-slate-700">{i.item}</span>
                          <span className="text-emerald-700 font-bold bg-white px-2 py-1 rounded-lg shadow-sm text-sm">{i.qty}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  {selectedRecipe.missing_ingredients?.length > 0 && (
                    <div>
                      <h3 className="font-bold mb-4 flex items-center gap-2 text-xl text-slate-800">
                        <ShoppingCart className="w-6 h-6 text-orange-500" /> You Need
                      </h3>
                      <div className="bg-orange-50 rounded-2xl p-1 border border-orange-100 mb-4">
                        {selectedRecipe.missing_ingredients.map((i, idx) => (
                          <div key={idx} className="flex justify-between items-center p-3 border-b border-orange-100 last:border-0 hover:bg-orange-100/50 rounded-xl transition-colors">
                            <span className="font-medium text-slate-700">{i.item || i.name || i}</span>
                            <span className="text-orange-700 font-bold text-xs bg-white px-2 py-1 rounded-lg shadow-sm border border-orange-100">
                              {i.total_amount_needed ? `${i.total_amount_needed}` : 'Required'}
                            </span>
                          </div>
                        ))}
                      </div>
                      <button onClick={() => {
                        setShoppingList([
                          ...shoppingList,
                          ...selectedRecipe.missing_ingredients.map(m => ({
                            id: Math.random(),
                            name: (m.item || m) + (m.total_amount_needed ? ` (${m.total_amount_needed})` : ''),
                            checked: false
                          }))
                        ]);
                        alert("Added!");
                      }}
                        className="w-full bg-orange-500 text-white font-bold py-4 rounded-xl hover:bg-orange-600 shadow-lg shadow-orange-200 active:scale-[0.98] transition-transform">
                        Add All to Shopping List
                      </button>
                    </div>
                  )}

                  <div>
                    <h3 className="font-bold mb-4 text-xl text-slate-800">Instructions</h3>
                    <div className="space-y-6">
                      {selectedRecipe.steps?.map((s, idx) => (
                        <div key={idx} className="flex gap-4 group">
                          <span className="bg-slate-100 text-slate-600 w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 text-sm font-bold group-hover:bg-slate-800 group-hover:text-white transition-colors">
                            {idx + 1}
                          </span>
                          <p className="text-slate-700 leading-relaxed pt-1 text-lg">{s}</p>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="pt-6 border-t pb-10">
                    {isCookedState ? (
                      <button onClick={() => handleAddLeftover(selectedRecipe.name)}
                        className="w-full bg-rose-500 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-rose-200 active:scale-[0.98] transition-transform">
                        <ThermometerSnowflake className="w-5 h-5" /> Save Leftovers
                      </button>
                    ) : (
                      <button onClick={markAsCooked}
                        className="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-emerald-200 active:scale-[0.98] transition-transform">
                        <Check className="w-5 h-5" /> Mark as Cooked
                      </button>
                    )}
                  </div>
                </div>
              </div>
            )}
          </Modal>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<MealPrepMate />);
  </script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      // Inline service worker script
      const swCode = `
        self.addEventListener('install', (e) => self.skipWaiting());
        self.addEventListener('fetch', (e) => e.respondWith(fetch(e.request)));
      `;
      const blob = new Blob([swCode], { type: 'text/javascript' });
      const swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl, { scope: '/Meal-prep-mate/' });
    });
  }
</script>


</body>
</html>
