<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MealPrepMate</title>

  <link rel="manifest" href='data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22MealPrepMate%22%2C%22short_name%22%3A%22MealPrep%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23ffffff%22%2C%22theme_color%22%3A%22%2310b981%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Fcdn-icons-png.flaticon.com%2F512%2F1830%2F1830839.png%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fpng%22%7D%2C%7B%22src%22%3A%22https%3A%2F%2Fcdn-icons-png.flaticon.com%2F512%2F1830%2F1830839.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D' />

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#10b981">
  <meta name="application-name" content="MealPrepMate">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out',
            'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { transform: 'translateY(100%)' }, '100%': { transform: 'translateY(0)' } },
          },
        },
      },
    };
  </script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?deps=react@18.2.0",
        "lucide-react": "https://esm.sh/lucide-react@0.468.0?deps=react@18.2.0"
      }
    }
  </script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
    #root { height: 100%; width: 100%; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    body { overscroll-behavior-y: none; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>

<body class="bg-slate-50 text-slate-900 select-none">
  <div id="root" class="h-[100dvh] w-full flex flex-col items-stretch overflow-hidden bg-white"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      ChefHat, Refrigerator, Users, ShoppingCart, Clock, Heart,
      ScanBarcode, Camera, Utensils, Trash2, Plus, Minus, Edit2,
      ArrowLeft, Loader2, Check, AlertCircle, X, Image as ImageIcon, Sparkles,
      UserCheck, History, User, ThermometerSnowflake, Settings, Key, 
      MessageCircle, Download, Leaf, Copy, Save, MapPin, Receipt, AlertTriangle
    } from 'lucide-react';

    // --- Constants ---
    const UNITS = ['count', 'lbs', 'oz', 'kg', 'g', 'cup', 'tbsp', 'tsp', 'gallon', 'liter', 'ml', 'box', 'bag', 'can', 'jar', 'bottle', 'pinch', 'bunch'];
    const DEFAULT_LOCATIONS = ['Pantry', 'Fridge', 'Freezer', 'Spice Rack', 'Counter', 'Baking Cabinet'];

    // --- LocalStorage Hooks ---
    const useLocalStorage = (key, initialValue) => {
      const [storedValue, setStoredValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initialValue;
        } catch (error) { console.error(error); return initialValue; }
      });
      const setValue = (value) => {
        try {
          const valueToStore = value instanceof Function ? value(storedValue) : value;
          setStoredValue(valueToStore);
          window.localStorage.setItem(key, JSON.stringify(valueToStore));
        } catch (error) { console.error(error); }
      };
      return [storedValue, setValue];
    };

    // --- API Helpers ---
    const callGemini = async (apiKey, prompt, imageBase64s = []) => {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${apiKey}`;
      const parts = [{ text: prompt }];
      if (Array.isArray(imageBase64s)) {
          imageBase64s.forEach(img => parts.push({ inlineData: { mimeType: "image/jpeg", data: img } }));
      } else if (imageBase64s) {
          parts.push({ inlineData: { mimeType: "image/jpeg", data: imageBase64s } });
      }

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts }], generationConfig: { responseMimeType: "application/json" } })
        });

        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error?.message || `API Error: ${response.status}`);
        }
        const data = await response.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
        if (!text) throw new Error("No data returned from AI.");
        return JSON.parse(text.replace(/```json/g, '').replace(/```/g, '').trim());
      } catch (error) {
        console.error("Gemini API Failed:", error);
        return { error: true, message: error.message };
      }
    };

    // --- Shared Components ---
    const LoadingOverlay = ({ message }) => (
      <div className="absolute inset-0 bg-white/90 backdrop-blur-sm z-[100] flex flex-col items-center justify-center p-8 animate-fade-in">
        <Loader2 className="w-12 h-12 text-emerald-500 animate-spin mb-4" />
        <p className="text-slate-600 font-medium text-center animate-pulse">{message}</p>
      </div>
    );

    const Modal = ({ isOpen, onClose, title, children }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[60] flex items-end sm:items-center justify-center bg-black/50 backdrop-blur-sm p-0 sm:p-4 animate-fade-in">
          <div className="bg-white w-full sm:max-w-xl h-[95dvh] sm:h-auto sm:max-h-[90vh] rounded-t-3xl sm:rounded-2xl shadow-2xl overflow-hidden flex flex-col animate-slide-up mx-auto relative">
            <div className="flex items-center justify-between p-4 border-b border-slate-100 bg-white sticky top-0 z-10">
                <h3 className="font-bold text-lg">{title}</h3>
                <button onClick={onClose} className="p-2 bg-slate-100 hover:bg-slate-200 rounded-full transition-all"><X className="w-5 h-5 text-slate-700" /></button>
            </div>
            <div className="overflow-y-auto flex-1 bg-slate-50">{children}</div>
          </div>
        </div>
      );
    };

    const UnitSelect = ({ value, onChange, className }) => (
        <select value={value} onChange={onChange} className={`bg-white border border-slate-200 rounded-lg px-2 py-1 text-sm ${className}`}>
            {UNITS.map(u => <option key={u} value={u}>{u}</option>)}
        </select>
    );

    const ApiKeyModal = ({ isOpen, onSave }) => {
      if(!isOpen) return null;
      return <div className="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-6 animate-fade-in"><div className="bg-white rounded-2xl p-6 w-full max-w-sm"><h2 className="font-bold text-xl mb-4">API Key Required</h2><input className="w-full border p-2 rounded mb-4" placeholder="Gemini Key" onBlur={(e) => onSave(e.target.value)} /><p className="text-xs text-slate-500">Get key at aistudio.google.com</p></div></div>
    };

    // --- Inventory View ---
    const InventoryView = ({ apiKey, inventory, setInventory, processedImages, setProcessedImages }) => {
      const [isScanning, setIsScanning] = useState(false);
      const [scanResults, setScanResults] = useState(null);
      const fileInputRef = useRef(null);
      const [locations, setLocations] = useLocalStorage('mpm_locations', DEFAULT_LOCATIONS);
      const [editingId, setEditingId] = useState(null);
      const [editForm, setEditForm] = useState({});

      const startEdit = (item) => { setEditingId(item.id); setEditForm({...item}); };
      const saveEdit = () => { 
        setInventory(inv => inv.map(i => i.id === editingId ? editForm : i));
        if (editForm.location && !locations.includes(editForm.location)) setLocations([...locations, editForm.location]);
        setEditingId(null); 
      };

      const handleImageUpload = async (e) => {
        if (!e.target.files || e.target.files.length === 0) return;
        const files = Array.from(e.target.files);
        const uniqueFiles = [];
        for (const file of files) {
            const key = `${file.name}-${file.size}`;
            if (processedImages.includes(key)) { if (!confirm(`You've scanned "${file.name}" before. Scan again?`)) continue; }
            uniqueFiles.push({ file, key });
        }
        if (uniqueFiles.length === 0) return;

        setIsScanning(true);
        const stagedGroups = [];
        for (const { file, key } of uniqueFiles) {
            await new Promise(resolve => {
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const base64 = reader.result.replace("data:", "").replace(/^.+,/, "");
                    const prompt = `Analyze this image (pantry/fridge/receipt). 1. Identify type (receipt/storage). 2. If storage, suggest location. 3. List items with estimated quantity/unit. JSON: { "type": "receipt", "suggested_location": "Pantry", "items": [{ "name": "Milk", "quantity": 1, "unit": "gallon" }] }`;
                    try {
                        const res = await callGemini(apiKey, prompt, base64);
                        stagedGroups.push({ id: Math.random().toString(), imageName: file.name, imageKey: key, preview: reader.result, type: res.type || 'storage', location: res.suggested_location || 'Unsorted', items: res.items?.map(i => ({...i, id: Math.random().toString(), selected: true })) || [] });
                    } catch (err) { console.error(err); }
                    resolve();
                };
                reader.readAsDataURL(file);
            });
        }
        setScanResults(stagedGroups);
        setIsScanning(false);
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      const finalizeScan = () => {
          let updatedInventory = [...inventory];
          const usedKeys = [];
          scanResults.forEach(group => {
            usedKeys.push(group.imageKey);
            group.items.filter(i => i.selected).forEach(item => {
                const itemLoc = group.type === 'receipt' ? 'Pantry' : group.location;
                if (group.type === 'receipt') {
                     const idx = updatedInventory.findIndex(inv => inv.name.toLowerCase() === item.name.toLowerCase());
                     if (idx > -1) updatedInventory[idx].quantity += Number(item.quantity);
                     else updatedInventory.push({ id: Math.random().toString(36), name: item.name, quantity: Number(item.quantity), unit: item.unit, location: itemLoc, addedAt: new Date().toISOString() });
                 } else {
                     updatedInventory.push({ id: Math.random().toString(36), name: item.name, quantity: Number(item.quantity), unit: item.unit, location: itemLoc, addedAt: new Date().toISOString() });
                 }
            });
          });
          setInventory(updatedInventory);
          setProcessedImages([...processedImages, ...usedKeys]);
          const newLocs = [...locations];
          scanResults.forEach(g => { if(g.location && !newLocs.includes(g.location)) newLocs.push(g.location); });
          setLocations(newLocs);
          setScanResults(null);
      };

      const groupedInventory = inventory.reduce((acc, item) => {
          const loc = item.location || 'Unsorted';
          if (!acc[loc]) acc[loc] = [];
          acc[loc].push(item);
          return acc;
      }, {});

      return (
        <div className="w-full p-4 space-y-5 pb-32">
          {isScanning && <LoadingOverlay message="Analyzing items & locations..." />}
          <Modal isOpen={!!scanResults} onClose={() => setScanResults(null)} title="Review Scan">
             {scanResults && (
                 <div className="space-y-6 pb-20">
                     {scanResults.map((group, gIdx) => (
                         <div key={group.id} className="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden">
                             <div className="p-3 bg-slate-100 border-b border-slate-200 flex gap-3 items-center">
                                 <img src={group.preview} className="w-12 h-12 rounded-lg object-cover" />
                                 <div className="flex-1">
                                     <div className="text-xs font-bold text-slate-500 uppercase">{group.type}</div>
                                     <div className="flex items-center gap-2">
                                         <MapPin className="w-4 h-4 text-slate-400" />
                                         <input list="locations" value={group.location} onChange={(e) => { const newResults = [...scanResults]; newResults[gIdx].location = e.target.value; setScanResults(newResults); }} className="bg-white border border-slate-300 rounded px-2 py-1 text-sm font-bold w-full" />
                                         <datalist id="locations">{locations.map(l => <option key={l} value={l} />)}</datalist>
                                     </div>
                                 </div>
                             </div>
                             <div className="p-2 space-y-2">
                                 {group.items.map((item, iIdx) => (
                                     <div key={item.id} className={`flex items-center gap-2 p-2 rounded-lg ${item.selected ? 'bg-white shadow-sm' : 'opacity-50'}`}>
                                         <input type="checkbox" checked={item.selected} onChange={() => { const newResults = [...scanResults]; newResults[gIdx].items[iIdx].selected = !item.selected; setScanResults(newResults); }} className="w-5 h-5 accent-emerald-500" />
                                         <input value={item.name} onChange={(e) => { const newResults = [...scanResults]; newResults[gIdx].items[iIdx].name = e.target.value; setScanResults(newResults); }} className="flex-1 min-w-0 bg-transparent text-sm font-medium focus:outline-none border-b border-transparent focus:border-emerald-300" />
                                         <input type="number" value={item.quantity} onChange={(e) => { const newResults = [...scanResults]; newResults[gIdx].items[iIdx].quantity = e.target.value; setScanResults(newResults); }} className="w-12 text-center bg-slate-50 border rounded text-sm py-1" />
                                         <UnitSelect value={item.unit} onChange={(e) => { const newResults = [...scanResults]; newResults[gIdx].items[iIdx].unit = e.target.value; setScanResults(newResults); }} className="w-20" />
                                     </div>
                                 ))}
                                 <button onClick={() => { const newResults = [...scanResults]; newResults[gIdx].items.push({ id: Math.random(), name: '', quantity: 1, unit: 'count', selected: true }); setScanResults(newResults); }} className="w-full py-2 text-xs font-bold text-slate-400 hover:text-emerald-500 border-t border-dashed border-slate-200 mt-2">+ Add Missed Item</button>
                             </div>
                         </div>
                     ))}
                     <button onClick={finalizeScan} className="w-full bg-emerald-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-emerald-200 sticky bottom-0 z-20">Confirm All</button>
                 </div>
             )}
          </Modal>

          <div className="flex items-center justify-between px-1"><h2 className="text-2xl font-bold text-slate-900 flex items-center gap-2"><Refrigerator className="w-6 h-6 text-emerald-500" /> Pantry</h2><span className="text-xs font-bold bg-slate-100 px-3 py-1.5 rounded-full text-slate-500">{inventory.length} items</span></div>
          <div className="flex gap-2 w-full"><button onClick={() => fileInputRef.current?.click()} className="flex-1 flex items-center justify-center gap-2 bg-indigo-50 text-indigo-600 p-4 rounded-xl font-bold text-sm hover:bg-indigo-100 active:scale-95 transition-transform"><Camera className="w-5 h-5" /> Smart Scan</button><input type="file" ref={fileInputRef} className="hidden" accept="image/*" multiple onChange={handleImageUpload} /></div>
          <form onSubmit={(e) => { e.preventDefault(); const fd = new FormData(e.target); const name = fd.get('name'); if(!name) return; setInventory([...inventory, { id: Math.random().toString(), name, quantity: 1, unit: 'count', location: 'Unsorted', addedAt: new Date().toISOString() }]); e.target.reset(); }} className="flex gap-2 w-full"><input name="name" placeholder="Quick add item..." className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500" /><button type="submit" className="bg-emerald-500 text-white w-14 rounded-xl flex items-center justify-center"><Plus className="w-6 h-6" /></button></form>

          <div className="space-y-6">
            {Object.keys(groupedInventory).sort().map(loc => (
                <div key={loc} className="space-y-2">
                    <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest pl-1 sticky top-0 bg-white/90 backdrop-blur-sm py-2 z-10">{loc}</h3>
                    {groupedInventory[loc].map((item) => (
                        <div key={item.id} className="bg-white border border-slate-100 rounded-2xl p-3 shadow-sm w-full">
                            {editingId === item.id ? (
                                <div className="space-y-3">
                                    <div className="flex gap-2"><input value={editForm.name} onChange={e => setEditForm({...editForm, name: e.target.value})} className="flex-1 border rounded px-2 py-1 font-bold" /><button onClick={() => setInventory(inventory.filter(i => i.id !== item.id))} className="text-red-500 p-1"><Trash2 className="w-5 h-5" /></button></div>
                                    <div className="flex gap-2"><input type="number" value={editForm.quantity} onChange={e => setEditForm({...editForm, quantity: Number(e.target.value)})} className="w-16 border rounded px-2 py-1" /><UnitSelect value={editForm.unit} onChange={e => setEditForm({...editForm, unit: e.target.value})} className="flex-1" /></div>
                                    <div className="flex gap-2"><input list="locations" value={editForm.location} onChange={e => setEditForm({...editForm, location: e.target.value})} className="flex-1 border rounded px-2 py-1 text-sm" placeholder="Location" /><datalist id="locations">{locations.map(l => <option key={l} value={l} />)}</datalist><button onClick={saveEdit} className="bg-emerald-500 text-white px-4 rounded-lg"><Check className="w-4 h-4" /></button></div>
                                </div>
                            ) : (
                                <div className="flex items-center justify-between">
                                    <div className="flex items-center gap-3"><div className="bg-emerald-50 text-emerald-700 w-16 h-12 rounded-lg flex flex-col items-center justify-center leading-none border border-emerald-100"><span className="font-bold text-lg">{item.quantity}</span><span className="text-[10px] uppercase font-bold opacity-70">{item.unit || 'cnt'}</span></div><span className="font-bold text-slate-700 text-lg">{item.name}</span></div>
                                    <button onClick={() => startEdit(item)} className="p-2 text-slate-300 hover:text-blue-500"><Edit2 className="w-5 h-5" /></button>
                                </div>
                            )}
                        </div>
                    ))}
                </div>
            ))}
            {inventory.length === 0 && <div className="text-center py-12 text-slate-400">Pantry is empty. Scan items to start.</div>}
          </div>
        </div>
      );
    };

    // --- Recipe/Plan View ---
    const RecipeEngine = ({ apiKey, inventory, setInventory, family, setSelectedRecipe, history, setHistory, recipes, setRecipes, favorites, setFavorites }) => {
      const [loading, setLoading] = useState(false);
      const [activeTab, setActiveTab] = useState('generate');
      const [deductionReview, setDeductionReview] = useState(null);
      const [missingItemAdd, setMissingItemAdd] = useState(null);
      const [urlInput, setUrlInput] = useState('');
      const [mode, setMode] = useState('Standard');
      const [eaters, setEaters] = useState(family.map(f => f.id));

      const generate = async () => {
         setLoading(true);
         const invStr = inventory.map(i => `${i.name} (${i.quantity} ${i.unit})`).join(', ');
         const famStr = family.filter(f => eaters.includes(f.id)).map(f => `${f.name} (Age:${f.age}, Diet:${f.diet})`).join(', ');
         const prompt = `Act as expert chef. Context: Inventory: [${invStr}]. Eaters: [${famStr}]. Theme: ${urlInput || mode}. Create 3 recipes. Requirements: Use inventory first. If missing ingredients, list them with amount needed. JSON: { "recipes": [{ "name": "Pasta", "description": "...", "time": "20m", "ingredients": [{"item": "Pasta", "qty": "1 lb"}], "missing_ingredients": [{"item": "Sauce", "total_amount_needed": "1 jar"}], "steps": ["Boil water"], "dietary_adaptations": "Use GF pasta" }] }`;
         try {
             const res = await callGemini(apiKey, prompt);
             if(res.recipes) setRecipes(res.recipes.map(r => ({...r, id: Math.random().toString()})));
         } catch(e) { alert(e.message); }
         setLoading(false);
      };

      const handleCookRequest = async (recipe) => {
          setLoading(true);
          const prompt = `I cooked "${recipe.name}". Recipe Ingredients: ${JSON.stringify(recipe.ingredients.concat(recipe.missing_ingredients || []))}. My Pantry: ${JSON.stringify(inventory.map(i => ({ id: i.id, name: i.name, qty: i.quantity, unit: i.unit })))}. TASK: 1. Match items. 2. Calculate NEW quantities. 3. Return JSON: { "deductions": [{ "pantryItemId": "...", "name": "Flour", "oldQty": 0.5, "oldUnit": "bag", "used": "2 cups", "newQty": 0.3, "newUnit": "bag" }] }`;
          try {
              const res = await callGemini(apiKey, prompt);
              setDeductionReview({ recipe, changes: res.deductions });
          } catch(e) { console.error(e); alert("AI Math failed. Try again."); }
          setLoading(false);
      };

      const confirmDeduction = () => {
          if (!deductionReview) return;
          const updates = {};
          deductionReview.changes.forEach(c => { updates[c.pantryItemId] = { q: c.newQty, u: c.newUnit }; });
          setInventory(inv => inv.map(item => updates[item.id] ? { ...item, quantity: updates[item.id].q, unit: updates[item.id].u } : item).filter(i => i.quantity > 0));
          setHistory([{...deductionReview.recipe, id: Math.random(), cookedAt: new Date().toISOString()}, ...history]);
          setDeductionReview(null);
          setSelectedRecipe(null);
          alert("Bon Appétit! Pantry updated.");
      };

      const handleAddMissing = (itemName) => { setMissingItemAdd({ name: itemName, quantity: 1, unit: 'count', location: 'Pantry' }); };
      const confirmMissingAdd = () => { setInventory([...inventory, { ...missingItemAdd, id: Math.random().toString(), addedAt: new Date().toISOString() }]); setMissingItemAdd(null); };

      return (
        <div className="w-full pb-32">
          {loading && <LoadingOverlay message="Working magic..." />}
          <div className="bg-white px-4 pt-4 pb-2 sticky top-0 z-20 border-b border-slate-50">
            <div className="flex bg-slate-100 rounded-xl p-1 w-full"><button onClick={() => setActiveTab('generate')} className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition-all ${activeTab === 'generate' ? 'bg-white shadow-sm text-slate-900' : 'text-slate-400'}`}>New Ideas</button><button onClick={() => setActiveTab('history')} className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition-all ${activeTab === 'history' ? 'bg-white shadow-sm text-slate-900' : 'text-slate-400'}`}>History</button></div>
          </div>

          <Modal isOpen={!!deductionReview} onClose={() => setDeductionReview(null)} title="Update Pantry?">
              {deductionReview && (
                  <div className="space-y-4">
                      <div className="bg-blue-50 p-4 rounded-xl text-sm text-blue-800 flex gap-2"><AlertCircle className="w-5 h-5 shrink-0" /><p>Review pantry deductions for "{deductionReview.recipe.name}".</p></div>
                      <div className="space-y-3">{deductionReview.changes.map((change, idx) => (<div key={idx} className="bg-white border p-3 rounded-xl flex items-center justify-between shadow-sm"><div><div className="font-bold">{change.name}</div><div className="text-xs text-slate-500">Used: {change.used}</div></div><div className="flex items-center gap-2"><div className="text-right"><div className="text-xs text-slate-400 line-through">{change.oldQty} {change.oldUnit}</div><div className="font-bold text-emerald-600"><input type="number" value={change.newQty} onChange={(e) => { const newChanges = [...deductionReview.changes]; newChanges[idx].newQty = Number(e.target.value); setDeductionReview({...deductionReview, changes: newChanges}); }} className="w-16 border rounded text-center" /> {change.newUnit}</div></div></div></div>))}</div>

           <Modal isOpen={!!missingItemAdd} onClose={() => setMissingItemAdd(null)} title="Add Missing Item">

                      <input placeholder="Location" value={missingItemAdd.location} onChange={e => setMissingItemAdd({...missingItemAdd, location: e.target.value})} className="w-full border rounded px-3 py-2" />
                      <button onClick={confirmMissingAdd} className="w-full bg-blue-500 text-white font-bold py-3 rounded-xl">Add to Pantry</button>
                  </div>
              )}
          </Modal>

          <div className="p-4 space-y-4">
            {activeTab === 'generate' ? (
                <>
                  <div className="space-y-4 w-full">
                    <textarea value={urlInput} onChange={e => setUrlInput(e.target.value)} placeholder="What are you craving? (or paste a URL)" className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm min-h-[100px]" />
                    {family.length > 0 && (<div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide w-full">{family.map(m => (<button key={m.id} onClick={() => setEaters(eaters.includes(m.id) ? eaters.filter(id => id !== m.id) : [...eaters, m.id])} className={`flex items-center gap-2 px-4 py-2.5 rounded-full text-sm font-bold border whitespace-nowrap transition-colors ${eaters.includes(m.id) ? 'bg-orange-50 border-orange-200 text-orange-700' : 'bg-white border-slate-200 text-slate-400'}`}>{eaters.includes(m.id) ? <Check className="w-4 h-4" /> : <UserCheck className="w-4 h-4" />} {m.name}</button>))}</div>)}
                    <div className="flex gap-3 w-full"><select value={mode} onChange={e => setMode(e.target.value)} className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium text-slate-700"><option>Standard</option><option>Quick (30m)</option><option>Hosting</option><option>Budget</option></select><button onClick={generate} className="flex-1 bg-gradient-to-r from-orange-500 to-amber-500 text-white font-bold py-3 rounded-xl shadow-lg flex items-center justify-center gap-2"><Sparkles className="w-5 h-5" /> Generate</button></div>
                  </div>
                  {recipes.map(r => (
                      <div key={r.id} onClick={() => setSelectedRecipe(r)} className="bg-white rounded-3xl border border-slate-100 shadow-sm p-5 active:scale-[0.98] transition-transform">

                          <p className="text-slate-500 text-sm line-clamp-2">{r.description}</p>
                          <div className="flex gap-2 mt-3"><span className="text-xs bg-slate-100 px-2 py-1 rounded font-bold">{r.time}</span><span className={`text-xs px-2 py-1 rounded font-bold ${r.missing_ingredients?.length ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}`}>{r.missing_ingredients?.length || 0} missing</span></div>
                      </div>
                  ))}
                </>
            ) : (
                <div className="space-y-4 w-full">
                  {history.length === 0 && <p className="text-center text-slate-400 py-10">No cooked recipes yet.</p>}

                    <div key={h.id} className="bg-white p-4 rounded-2xl border border-slate-100 flex gap-4 w-full shadow-sm" onClick={() => setSelectedRecipe(h)}>

                        <div><h3 className="font-bold text-lg text-slate-800">{h.name}</h3><div className="text-xs text-slate-500 mt-1 flex items-center gap-1"><History className="w-3 h-3" /> {new Date(h.cookedAt).toLocaleDateString()}</div></div>
                    </div>
                  ))}

          </div>
          <Modal isOpen={!!selectedRecipe && !deductionReview && !missingItemAdd} onClose={() => setSelectedRecipe(null)} title={selectedRecipe?.name}>
              {selectedRecipe && (
                  <div className="space-y-6 pb-10">
                      {selectedRecipe.imageUrl && <img src={selectedRecipe.imageUrl} className="w-full h-56 object-cover rounded-xl" />}

                      {selectedRecipe.dietary_adaptations && (<div className="bg-purple-50 p-4 rounded-2xl border border-purple-100"><div className="flex items-center gap-2 mb-2 text-purple-700 font-bold text-sm uppercase"><Users className="w-4 h-4" /> Family Adaptation</div><p className="text-sm text-purple-900 leading-relaxed">{selectedRecipe.dietary_adaptations}</p></div>)}
                      <div><h3 className="font-bold mb-2">Ingredients</h3><div className="space-y-2">{selectedRecipe.ingredients?.map((i, idx) => (<div key={idx} className="flex justify-between p-2 bg-emerald-50 rounded-lg border border-emerald-100"><span>{i.item}</span><span className="font-bold text-emerald-700">{i.qty}</span></div>))}{selectedRecipe.missing_ingredients?.map((i, idx) => (<div key={idx} onClick={() => handleAddMissing(i.item || i.name)} className="flex justify-between p-2 bg-red-50 rounded-lg border border-red-100 cursor-pointer active:bg-red-100"><span className="flex items-center gap-2"><Plus className="w-4 h-4" /> {i.item || i.name}</span><span className="font-bold text-red-700">{i.total_amount_needed || 'Needed'}</span></div>))}</div></div>
                      <div><h3 className="font-bold mb-2">Steps</h3><ol className="list-decimal pl-5 space-y-2 text-slate-700">{selectedRecipe.steps.map((s,i) => <li key={i}>{s}</li>)}</ol></div>
                      <div className="flex gap-2">
                          <button onClick={() => { setFavorites([...favorites, { ...selectedRecipe, id: Math.random().toString() }]); alert("Saved!"); }} className="flex-1 bg-slate-100 text-slate-600 font-bold py-4 rounded-xl flex items-center justify-center gap-2"><Heart className="w-5 h-5" /> Save</button>
                          <button onClick={() => handleCookRequest(selectedRecipe)} className="flex-[2] bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2"><Check className="w-5 h-5" /> Mark as Cooked</button>
                      </div>
                  </div>
              )}
          </Modal>
        </div>
      );
    };

    // --- Other Views ---
    const FamilyView = ({ familyMembers, setFamilyMembers }) => {
      const [name, setName] = useState(''); const [age, setAge] = useState(''); const [diet, setDiet] = useState('None'); const [preferences, setPreferences] = useState('');
      const addMember = (e) => { e.preventDefault(); if (!name) return; setFamilyMembers([...familyMembers, { id: Math.random().toString(), name, age, diet, preferences, addedAt: new Date().toISOString() }]); setName(''); setAge(''); setPreferences(''); };
      return (
        <div className="w-full p-4 space-y-5 pb-32">
          <h2 className="text-2xl font-bold text-slate-900 flex items-center gap-2 px-1"><Users className="w-6 h-6 text-purple-500" /> Family Profiles</h2>
          <form onSubmit={addMember} className="space-y-3 w-full">
            <div className="flex gap-3 w-full"><input value={name} onChange={e => setName(e.target.value)} placeholder="Name" className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3" /><input value={age} onChange={e => setAge(e.target.value)} placeholder="Age" type="number" className="w-20 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-center" /></div>
            <select value={diet} onChange={e => setDiet(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-700 font-medium"><option value="None">No Diet Restriction</option><option value="Vegan">Vegan</option><option value="Keto">Keto</option><option value="GF">Gluten Free</option></select>
            <input value={preferences} onChange={e => setPreferences(e.target.value)} placeholder="Likes/Dislikes" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm" />
            <button className="w-full bg-purple-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-purple-200">Add Profile</button>
          </form>
          <div className="space-y-3 w-full pt-2">{familyMembers.map(m => (<div key={m.id} className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center w-full"><div><div className="font-bold text-slate-800 text-lg flex items-center gap-2">{m.name}<span className="bg-slate-100 text-slate-500 text-xs px-2 py-0.5 rounded-full font-bold">{m.age}</span></div><div className="text-sm text-purple-600 font-medium mt-1">{m.diet}</div>{m.preferences && <div className="text-xs text-slate-400 mt-1 flex items-center gap-1"><MessageCircle className="w-3 h-3" /> {m.preferences}</div>}</div><button onClick={() => setFamilyMembers(familyMembers.filter(f => f.id !== m.id))} className="p-3 text-slate-300 hover:text-red-500"><Trash2 className="w-5 h-5" /></button></div>))}</div>
        </div>
      );
    };

    const ShoppingView = ({ apiKey, list, setList }) => {
      const [newItem, setNewItem] = useState(''); const [sorting, setSorting] = useState(false);
      const addItem = (e) => { e.preventDefault(); if (newItem) setList([...list, { id: Math.random().toString(), name: newItem, checked: false, category: 'Unsorted' }]); setNewItem(''); };
      const toggle = (id) => setList(list.map(i => i.id === id ? { ...i, checked: !i.checked } : i));
      const deleteItem = (id) => setList(list.filter(x => x.id !== id));
      const copyToClipboard = () => { if (list.length === 0) return; navigator.clipboard.writeText(list.map(i => `- ${i.name}`).join('\n')).then(() => alert("Copied!")); };
      const sortList = async () => { setSorting(true); try { const items = list.map(i => i.name).join(', '); const prompt = `Categorize: [${items}]. Return JSON: { "items": [{ "name": "Apple", "category": "Produce" }] }`; const res = await callGemini(apiKey, prompt); if (res.items) setList(list.map(item => { const found = res.items.find(ai => ai.name.toLowerCase().includes(item.name.toLowerCase()) || item.name.toLowerCase().includes(ai.name.toLowerCase())); return found ? { ...item, category: found.category } : item; })); } catch(e) { console.error(e); } finally { setSorting(false); } };
      const grouped = list.reduce((acc, item) => { const cat = item.category || 'Unsorted'; if (!acc[cat]) acc[cat] = []; acc[cat].push(item); return acc; }, {});
      const categories = Object.keys(grouped).sort();
      return (
        <div className="w-full min-h-full pb-32">
          <div className="p-4 space-y-6 w-full">
            <div className="flex items-center justify-between px-1"><h2 className="text-2xl font-bold text-slate-900 flex items-center gap-2"><ShoppingCart className="w-6 h-6 text-blue-500" /> Shopping List</h2><div className="flex gap-2"><button onClick={copyToClipboard} disabled={list.length === 0} className="text-xs font-bold bg-slate-100 text-slate-600 px-3 py-2 rounded-full hover:bg-slate-200 flex items-center gap-1 disabled:opacity-50"><Copy className="w-3 h-3" /> Copy</button><button onClick={sortList} disabled={sorting || list.length === 0} className="text-xs font-bold bg-blue-50 text-blue-600 px-3 py-2 rounded-full hover:bg-blue-100 flex items-center gap-1 disabled:opacity-50">{sorting ? <Loader2 className="w-3 h-3 animate-spin"/> : <Sparkles className="w-3 h-3" />} Sort</button><button onClick={() => setList([])} className="text-xs font-bold text-slate-400 px-2">Clear</button></div></div>
            <form onSubmit={addItem} className="flex gap-2 w-full"><input value={newItem} onChange={e => setNewItem(e.target.value)} placeholder="Add item..." className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500" /><button className="bg-blue-500 text-white p-3 rounded-xl active:bg-blue-600"><Plus className="w-6 h-6" /></button></form>
            <div className="space-y-4 w-full">{list.length === 0 && <p className="text-center text-slate-400 py-10">List is empty.</p>}{categories.map(cat => (<div key={cat} className="space-y-2"><h3 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-1">{cat}</h3>{grouped[cat].map(i => (<div key={i.id} onClick={() => toggle(i.id)} className={`flex justify-between items-center p-4 border-b border-slate-100 last:border-0 transition-all rounded-xl ${i.checked ? 'opacity-50 bg-slate-50' : 'bg-white shadow-sm border border-slate-100'}`}><div className="flex items-center gap-4"><div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center transition-colors ${i.checked ? 'bg-blue-500 border-blue-500 text-white' : 'border-slate-300'}`}>{i.checked && <Check className="w-4 h-4" />}</div><span className={`text-lg ${i.checked ? 'line-through text-slate-400' : 'text-slate-800 font-medium'}`}>{i.name}</span></div><button onClick={(e) => { e.stopPropagation(); deleteItem(i.id); }} className="text-slate-300 hover:text-red-500 p-2"><Trash2 className="w-5 h-5" /></button></div>))}</div>))}</div>
          </div>
        </div>
      );
    };

    const LeftoversView = ({ leftovers, setLeftovers, apiKey }) => {
      const [selected, setSelected] = useState(null);
      const handleAddLeftover = async (e) => { e.preventDefault(); const fd = new FormData(e.target); const name = fd.get('name'); if(!name) return; const id = Math.random().toString(36).substr(2, 9); try { const res = await callGemini(apiKey, `Storage for "${name}". JSON: { "tip": "...", "days": 3, "reheat": "..." }`); const exp = new Date(); exp.setDate(exp.getDate() + (res?.days || 3)); setLeftovers([...leftovers, { id, name, tip: res?.tip || "Refrigerate", reheat: res?.reheat || "Heat well", expiresAt: exp.toISOString(), addedAt: new Date().toISOString() }]); } catch(e) { setLeftovers([...leftovers, { id, name, tip: "Refrigerate", reheat: "Heat well", expiresAt: new Date(Date.now() + 259200000).toISOString(), addedAt: new Date().toISOString() }]); } e.target.reset(); };
      return (
        <div className="w-full min-h-full pb-32">
          <div className="p-4 space-y-6 w-full">
            <div className="flex items-center justify-between px-1"><h2 className="text-2xl font-bold text-slate-900 flex items-center gap-2"><ThermometerSnowflake className="w-6 h-6 text-rose-500" /> Fridge</h2><span className="text-xs font-bold bg-slate-100 px-3 py-1.5 rounded-full text-slate-500">{leftovers.length} items</span></div>
            <form onSubmit={handleAddLeftover} className="flex gap-2 w-full"><input name="name" placeholder="Stored item..." className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3" /><button className="bg-rose-500 text-white p-3 rounded-xl"><Plus className="w-6 h-6" /></button></form>
            <div className="space-y-3 w-full">{leftovers.map(l => (<div key={l.id} onClick={() => setSelected(l)} className="bg-white rounded-2xl border border-slate-100 p-4 flex justify-between items-center shadow-sm w-full active:bg-slate-50 transition-colors"><div><h3 className="font-bold text-lg text-slate-800">{l.name}</h3><p className="text-xs font-medium text-slate-400 mt-1 flex items-center gap-1"><Clock className="w-3 h-3" /> {Math.ceil((new Date(l.expiresAt) - new Date()) / 86400000)} days left</p></div><div className="text-xs bg-rose-50 text-rose-600 px-3 py-1.5 rounded-lg font-bold">Eat Me</div></div>))}</div>
          </div>
          <Modal isOpen={!!selected} onClose={() => setSelected(null)}>{selected && (<div className="p-6 space-y-6"><h2 className="text-2xl font-bold">{selected.name}</h2><div className="grid grid-cols-2 gap-4"><div className="bg-slate-50 p-4 rounded-2xl"><div className="text-xs font-bold text-slate-400 uppercase mb-2">Storage</div><p>{selected.tip}</p></div><div className="bg-slate-50 p-4 rounded-2xl"><div className="text-xs font-bold text-slate-400 uppercase mb-2">Reheat</div><p>{selected.reheat}</p></div></div><button onClick={() => { setLeftovers(leftovers.filter(x => x.id !== selected.id)); setSelected(null); }} className="w-full bg-emerald-500 text-white py-4 rounded-xl font-bold">Eat Portion</button></div>)}</Modal>
        </div>
      );
    };

    // --- Main App ---
    function MealPrepMate() {
      const [view, setView] = useState('dashboard');
      const [apiKey, setApiKey] = useLocalStorage('mpm_api_key', '');
      const [inventory, setInventory] = useLocalStorage('mpm_inventory_v2', []); 
      const [processedImages, setProcessedImages] = useLocalStorage('mpm_processed_images', []);
      const [family, setFamily] = useLocalStorage('mpm_family', []);
      const [favorites, setFavorites] = useLocalStorage('mpm_favorites', []);
      const [history, setHistory] = useLocalStorage('mpm_history', []);
      const [shoppingList, setShoppingList] = useLocalStorage('mpm_list', []);
      const [leftovers, setLeftovers] = useLocalStorage('mpm_leftovers', []);
      const [recipes, setRecipes] = useState([]);
      const [selectedRecipe, setSelectedRecipe] = useState(null);
      const [installPrompt, setInstallPrompt] = useState(null);
      const [imageLoading, setImageLoading] = useState(false);

      useEffect(() => { window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); setInstallPrompt(e); }); }, []);
      const handleInstall = async () => { if (installPrompt) { installPrompt.prompt(); setInstallPrompt(null); } };

      // --- Restored Image Gen Logic ---
      useEffect(() => {
        if (selectedRecipe && !selectedRecipe.imageUrl && !imageLoading) {
          const run = async () => {
            setImageLoading(true);
            const descriptionPrompt = `Describe a professional food photo of "${selectedRecipe.name}" in 15 words. Mention lighting and plating.`;
            let visualPrompt = selectedRecipe.name;
            try {
               const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${apiKey}`;
               const response = await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ contents: [{ parts: [{ text: descriptionPrompt }] }] }) });
               const data = await response.json();
               visualPrompt = data.candidates?.[0]?.content?.parts?.[0]?.text || selectedRecipe.name;
            } catch (e) { }
            const encodedPrompt = encodeURIComponent(visualPrompt);
            const seed = Math.floor(Math.random() * 1000);
            const imgUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=800&height=600&seed=${seed}&nologo=true&model=flux`;
            const update = (list, set) => { if (list.some(i => i.id === selectedRecipe.id)) set(list.map(i => i.id === selectedRecipe.id ? { ...i, imageUrl: imgUrl } : i)); };
            update(favorites, setFavorites); update(history, setHistory); update(recipes, setRecipes);
            setSelectedRecipe(prev => ({ ...prev, imageUrl: imgUrl }));
            setImageLoading(false);
          };
          run();
        }
      }, [selectedRecipe]);

      const NavBtn = ({ icon: Icon, label, active, onClick }) => ( <button onClick={onClick} className={`flex flex-col items-center gap-1 w-full py-2 transition-colors ${active ? 'text-emerald-600' : 'text-slate-400'}`}><Icon className="w-6 h-6" /><span className="text-[10px] font-bold">{label}</span></button> );

      const Dashboard = () => (
        <div className="w-full p-4 space-y-4 animate-fade-in pb-32">
          <div className="bg-gradient-to-br from-emerald-600 to-teal-800 text-white p-6 rounded-[2rem] shadow-xl relative overflow-hidden w-full">
            <div className="relative z-10"><h1 className="text-3xl font-bold mb-1">Hi, Chef!</h1><p className="text-emerald-100 text-sm mb-6">{inventory.length} items in pantry. {leftovers.length} leftovers.</p><div className="flex gap-3"><button onClick={() => setView('recipes')} className="flex-1 bg-white/20 backdrop-blur-md p-3.5 rounded-2xl flex items-center justify-center gap-2 font-bold text-sm active:scale-95 transition-transform"><Sparkles className="w-4 h-4" /> Plan Meal</button><button onClick={() => setView('inventory')} className="flex-1 bg-white text-emerald-900 p-3.5 rounded-2xl flex items-center justify-center gap-2 font-bold text-sm active:scale-95 transition-transform"><Plus className="w-4 h-4" /> Add Items</button></div></div>
            <ChefHat className="absolute -right-6 -bottom-6 w-40 h-40 text-white/10 rotate-12" />
          </div>
          <div className="grid grid-cols-2 gap-4 w-full">
            <div onClick={() => setView('shopping')} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 active:scale-[0.98] transition-transform"><div className="bg-blue-50 w-12 h-12 rounded-2xl flex items-center justify-center mb-3 text-blue-500"><ShoppingCart className="w-6 h-6" /></div><div className="font-bold text-lg text-slate-800">Shopping</div><div className="text-xs text-slate-400 mt-1">{shoppingList.filter(i => !i.checked).length} items</div></div>
            <div onClick={() => setView('favorites')} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 active:scale-[0.98] transition-transform"><div className="bg-red-50 w-12 h-12 rounded-2xl flex items-center justify-center mb-3 text-red-500"><Heart className="w-6 h-6" /></div><div className="font-bold text-lg text-slate-800">Favorites</div><div className="text-xs text-slate-400 mt-1">{favorites.length} saved</div></div>
          </div>
          <div onClick={() => setView('leftovers')} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex items-center justify-between active:scale-[0.98] transition-transform"><div className="flex items-center gap-4"><div className="bg-rose-50 w-12 h-12 rounded-2xl flex items-center justify-center text-rose-500"><ThermometerSnowflake className="w-6 h-6" /></div><div><div className="font-bold text-lg text-slate-800">Fridge</div><div className="text-xs text-slate-400 mt-1">{leftovers.length} leftovers</div></div></div><ArrowLeft className="w-5 h-5 text-slate-300 rotate-180" /></div>
        </div>
      );

      return (
        <div className="w-full h-[100dvh] flex flex-col relative bg-white overflow-hidden">
          <ApiKeyModal isOpen={!apiKey} onSave={setApiKey} />
          <div className="flex-none bg-white/90 backdrop-blur-md px-5 py-3 flex justify-between items-center border-b border-slate-100 z-30 sticky top-0">
             {view !== 'dashboard' ? <button onClick={() => setView('dashboard')} className="p-2 -ml-2 rounded-full hover:bg-slate-100 active:bg-slate-200"><ArrowLeft className="w-6 h-6 text-slate-700" /></button> : <div className="flex items-center gap-2"><div className="bg-emerald-500 p-1.5 rounded-lg"><ChefHat className="w-5 h-5 text-white" /></div><span className="font-bold text-xl text-slate-800">MealPrepMate</span></div>}
             <div className="flex gap-1">
                {installPrompt && <button onClick={handleInstall} className="p-2 rounded-full bg-emerald-50 text-emerald-600 font-bold flex items-center gap-2 px-3 animate-fade-in"><Download className="w-4 h-4" /><span className="hidden sm:inline">Install</span></button>}
                <button onClick={() => setView('family')} className="p-2 rounded-full hover:bg-slate-100 text-slate-600"><User className="w-6 h-6" /></button>
                <button onClick={() => { if (confirm("Reset App?")) localStorage.clear(); location.reload(); }} className="p-2 rounded-full hover:bg-slate-100 text-slate-600"><Settings className="w-6 h-6" /></button>
             </div>
          </div>
          <div className="flex-1 overflow-y-auto scrollbar-hide w-full relative bg-white">
            {view === 'dashboard' && <Dashboard />}
            {view === 'inventory' && <InventoryView apiKey={apiKey} inventory={inventory} setInventory={setInventory} processedImages={processedImages} setProcessedImages={setProcessedImages} />}
            {view === 'family' && <FamilyView familyMembers={family} setFamilyMembers={setFamily} />}
            {view === 'recipes' && <RecipeEngine apiKey={apiKey} inventory={inventory} setInventory={setInventory} family={family} setSelectedRecipe={setSelectedRecipe} history={history} setHistory={setHistory} recipes={recipes} setRecipes={setRecipes} favorites={favorites} setFavorites={setFavorites} />}
            {view === 'shopping' && <ShoppingView apiKey={apiKey} list={shoppingList} setList={setShoppingList} />}
            {view === 'leftovers' && <LeftoversView leftovers={leftovers} setLeftovers={setLeftovers} apiKey={apiKey} />}
            {view === 'favorites' && <div className="p-4 space-y-4">{favorites.map(r => (<div key={r.id} onClick={() => { setSelectedRecipe(r); setView('recipes'); }} className="bg-white border p-4 rounded-2xl shadow-sm"><div className="font-bold text-lg">{r.name}</div><div className="text-xs text-slate-500">{r.time}</div></div>))}</div>}
          </div>
          <div className="fixed bottom-0 left-0 right-0 w-full bg-white border-t border-slate-100 px-6 pb-safe pt-2 z-40 rounded-t-3xl shadow-[0_-5px_10px_rgba(0,0,0,0.02)]">
            <div className="flex justify-between items-end pb-2">
                <NavBtn icon={ChefHat} label="Home" active={view === 'dashboard'} onClick={() => setView('dashboard')} />
                <NavBtn icon={Utensils} label="Plan" active={view === 'recipes'} onClick={() => setView('recipes')} />
                <div className="relative -top-6 px-2"><button onClick={() => setView('inventory')} className="w-16 h-16 bg-gradient-to-tr from-emerald-400 to-emerald-600 rounded-full text-white flex items-center justify-center shadow-xl shadow-emerald-200 hover:scale-105 active:scale-95 transition-transform"><ScanBarcode className="w-7 h-7" /></button></div>
                <NavBtn icon={ShoppingCart} label="Shop" active={view === 'shopping'} onClick={() => setView('shopping')} />
                <NavBtn icon={ThermometerSnowflake} label="Fridge" active={view === 'leftovers'} onClick={() => setView('leftovers')} />
            </div>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<MealPrepMate />);
  </script>
  <script>if ('serviceWorker' in navigator) { window.addEventListener('load', () => { const swCode = `self.addEventListener('install', (e) => self.skipWaiting()); self.addEventListener('fetch', (e) => e.respondWith(fetch(e.request)));`; const blob = new Blob([swCode], { type: 'text/javascript' }); const swUrl = URL.createObjectURL(blob); navigator.serviceWorker.register(swUrl, { scope: './' }).catch(err => console.log('SW Fail:', err)); }); }</script>
</body>
</html>
