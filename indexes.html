<body class="bg-slate-50 text-slate-900 select-none">
  <div id="root" class="h-[100dvh] w-full flex flex-col items-stretch overflow-hidden bg-white"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      ChefHat, Refrigerator, Users, ShoppingCart, Clock, Heart,
      ScanBarcode, Camera, Utensils, Trash2, Plus,
      ArrowLeft, Loader2, Check,
      AlertCircle, X, Image as ImageIcon, Sparkles,
      UserCheck, History, User, ThermometerSnowflake,
      Settings, Key, ThumbsDown
    } from 'lucide-react';

    // --- LocalStorage Hooks ---
    const useLocalStorage = (key, initialValue) => {
      const [storedValue, setStoredValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initialValue;
        } catch (error) {
          console.error(error);
          return initialValue;
        }
      });

      const setValue = (value) => {
        try {
          const valueToStore = value instanceof Function ? value(storedValue) : value;
          setStoredValue(valueToStore);
          window.localStorage.setItem(key, JSON.stringify(valueToStore));
        } catch (error) {
          console.error(error);
        }
      };
      return [storedValue, setValue];
    };

    // --- API Helpers ---
    // FIXED: Now uses gemini-1.5-flash for stability and regex for JSON extraction
    const callGemini = async (apiKey, prompt, imageBase64 = null) => {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
      const parts = [{ text: prompt }];
      if (imageBase64) parts.push({ inlineData: { mimeType: "image/jpeg", data: imageBase64 } });

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts }], generationConfig: { responseMimeType: "application/json" } })
        });
        
        if (!response.ok) {
           const errData = await response.json();
           throw new Error(errData.error?.message || `API Error: ${response.status}`);
        }

        const data = await response.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
        console.log("Gemini Raw Response:", text); // Debugging

        // FIXED: Robust JSON extraction
        const jsonMatch = text.match(/\{[\s\S]*\}/);
        if (!jsonMatch) throw new Error("No JSON found in response");
        
        return JSON.parse(jsonMatch[0]);
      } catch (error) {
        console.error("Gemini API Failed:", error);
        return { error: true, message: error.message };
      }
    };

    // --- Shared Components ---
    const LoadingOverlay = ({ message }) => (
      <div className="absolute inset-0 bg-white/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center p-8 animate-fade-in">
        <Loader2 className="w-12 h-12 text-emerald-500 animate-spin mb-4" />
        <p className="text-slate-600 font-medium text-center animate-pulse">{message}</p>
      </div>
    );

    const Modal = ({ isOpen, onClose, children }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[60] flex items-end sm:items-center justify-center bg-black/50 backdrop-blur-sm p-0 sm:p-4 animate-fade-in">
          <div className="bg-white w-full sm:max-w-xl h-[95dvh] sm:h-auto sm:max-h-[90vh] rounded-t-3xl sm:rounded-2xl shadow-2xl overflow-hidden flex flex-col animate-slide-up mx-auto">
            <div className="flex justify-end p-4 absolute right-0 top-0 z-10">
              <button onClick={onClose} className="p-2 bg-white/80 hover:bg-white rounded-full shadow-sm backdrop-blur-md transition-all">
                <X className="w-5 h-5 text-slate-700" />
              </button>
            </div>
            <div className="overflow-y-auto flex-1 bg-slate-50">{children}</div>
          </div>
        </div>
      );
    };

    const ApiKeyModal = ({ isOpen, onSave }) => {
      const [key, setKey] = useState('');
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-6 animate-fade-in">
          <div className="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl space-y-6">
            <div className="text-center">
              <div className="w-16 h-16 bg-gradient-to-tr from-blue-500 to-purple-500 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg shadow-blue-200">
                <Key className="w-8 h-8 text-white" />
              </div>
              <h2 className="text-2xl font-bold text-slate-900">Setup AI Chef</h2>
              <p className="text-slate-500 mt-2">Enter your Gemini API Key to enable features.</p>
            </div>
            <div className="space-y-4">
              <div className="bg-blue-50 p-4 rounded-xl text-sm text-blue-800 flex items-start gap-3">
                <AlertCircle className="w-5 h-5 shrink-0" />
                <div>Get a free key at <a href="[https://aistudio.google.com/app/apikey](https://aistudio.google.com/app/apikey)" target="_blank" className="font-bold underline">Google AI Studio</a>.</div>
              </div>
              <input
                value={key}
                onChange={(e) => setKey(e.target.value)}
                placeholder="AIzaSy..."
                type="password"
                className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none"
              />
              <button
                onClick={() => key.length > 10 && onSave(key)}
                disabled={key.length < 10}
                className="w-full bg-slate-900 text-white font-bold py-4 rounded-xl disabled:opacity-50"
              >
                Start Cooking
              </button>
            </div>
          </div>
        </div>
      );
    };

    // --- VIEWS ---
    const InventoryView = ({ apiKey, inventory, setInventory }) => {
      const [newItem, setNewItem] = useState('');
      const [quantity, setQuantity] = useState(1);
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const fileInputRef = useRef(null);

      const addItem = (e) => {
        e.preventDefault();
        if (!newItem.trim()) return;
        setInventory([...inventory, { id: Math.random().toString(36).substr(2, 9), name: newItem, quantity, addedAt: new Date().toISOString() }]);
        setNewItem(''); setQuantity(1);
      };

      const handleImageUpload = async (e) => {
        if (!e.target.files || e.target.files.length === 0) return;
        setIsAnalyzing(true);
        const files = Array.from(e.target.files);
        const newItems = [];
        for (const file of files) {
          await new Promise(resolve => {
            const reader = new FileReader();
            reader.onloadend = async () => {
              if (!reader.result) { resolve(); return; }
              const base64 = reader.result.replace("data:", "").replace(/^.+,/, "");
              try {
                const prompt = `Analyze this image (fridge/pantry/receipt). List every single food item that you can confidently distinguish individually. 
STRICT RULE: Do not group items. Return JSON: { "items": [{ "name": "Milk", "quantity": 1 }] }`;
                const res = await callGemini(apiKey, prompt, base64);
                if (res?.items) res.items.forEach(i => newItems.push({ id: Math.random().toString(36).substr(2,9), name: i.name, quantity: i.quantity || 1, addedAt: new Date().toISOString() }));
              } catch (err) { console.error(err); }
              resolve();
            };
            reader.readAsDataURL(file);
          });
        }
        setInventory([...inventory, ...newItems]);
        setIsAnalyzing(false);
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      return (
        <div className="w-full p-4 space-y-5 pb-32">
          {isAnalyzing && <LoadingOverlay message="Scanning items..." />}

          <div className="flex items-center justify-between px-1">
            <h2 className="text-2xl font-bold text-slate-900 flex items-center gap-2">
              <Refrigerator className="w-6 h-6 text-emerald-500" /> Pantry
            </h2>
            <span className="text-xs font-bold bg-slate-100 px-3 py-1.5 rounded-full text-slate-500">{inventory.length} items</span>
          </div>

          <div className="grid grid-cols-2 gap-3 w-full">
            <button
              onClick={() => fileInputRef.current?.click()}
              className="flex items-center justify-center gap-2 bg-indigo-50 text-indigo-600 p-4 rounded-xl font-bold text-sm hover:bg-indigo-100 active:scale-[0.98] transition-all"
            >
              <Camera className="w-5 h-5" /> Scan Photos
            </button>
            <button className="flex items-center justify-center gap-2 bg-slate-100 text-slate-400 p-4 rounded-xl font-bold text-sm cursor-not-allowed opacity-60">
              <ScanBarcode className="w-5 h-5" /> Barcode
            </button>
            <input type="file" ref={fileInputRef} className="hidden" accept="image/*" multiple onChange={handleImageUpload} />
          </div>

          <form onSubmit={addItem} className="flex gap-2 w-full">
            <input
              value={newItem}
              onChange={(e) => setNewItem(e.target.value)}
              placeholder="Add item name..."
              className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500"
            />
            <input
              type="number"
              min="1"
              value={quantity}
              onChange={(e) => setQuantity(parseInt(e.target.value))}
              className="w-16 text-center bg-slate-50 border border-slate-200 rounded-xl py-3 focus:outline-none focus:border-emerald-500"
            />
            <button type="submit" className="bg-emerald-500 text-white w-14 rounded-xl flex items-center justify-center active:bg-emerald-600">
              <Plus className="w-6 h-6" />
            </button>
          </form>

          <div className="space-y-3">
            {inventory.length === 0 && (
              <div className="text-center py-12 text-slate-400">
                <Refrigerator className="w-16 h-16 mx-auto mb-4 text-slate-200" />
                <p>Your pantry is empty.</p>
              </div>
            )}
            {inventory.map((item) => (
              <div key={item.id} className="bg-white border border-slate-100 rounded-2xl p-4 flex items-center justify-between shadow-sm w-full">
                <div className="flex items-center gap-4">
                  <div className="bg-emerald-50 text-emerald-600 w-10 h-10 rounded-lg flex items-center justify-center font-bold text-sm">{item.quantity}</div>
                  <div className="font-bold text-slate-700 text-lg">{item.name}</div>
                </div>
                <div className="flex gap-1">
                  <button
                    onClick={() => setInventory(inventory.map(i => i.id === item.id ? { ...i, quantity: Math.max(0, i.quantity - 1) } : i).filter(i => i.quantity > 0))}
                    className="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-xl text-slate-400 hover:text-red-500 font-bold transition-colors"
                  >-</button>
                  <button
                    onClick={() => setInventory(inventory.map(i => i.id === item.id ? { ...i, quantity: i.quantity + 1 } : i))}
                    className="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-xl text-slate-400 hover:text-emerald-500 font-bold transition-colors"
                  >+</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const FamilyView = ({ familyMembers, setFamilyMembers }) => {
      const [name, setName] = useState('');
      const [age, setAge] = useState('');
      const [diet, setDiet] = useState('None');
      const [preferences, setPreferences] = useState('');

      const addMember = (e) => {
        e.preventDefault();
        if (!name) return;
        setFamilyMembers([...familyMembers, { id: Math.random().toString(), name, age, diet, preferences, addedAt: new Date().toISOString() }]);
        setName(''); setAge(''); setPreferences('');
      };

      return (
        <div className="w-full p-4 space-y-5 pb-32">
          <h2 className="text-2xl font-bold text-slate-900 flex items-center gap-2 px-1">
            <Users className="w-6 h-6 text-purple-500" /> Family Profiles
          </h2>

          <form onSubmit={addMember} className="space-y-3 w-full">
            <div className="flex gap-3 w-full">
              <input value={name} onChange={e => setName(e.target.value)} placeholder="Name"
                className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-purple-500 transition-colors" />
              <input value={age} onChange={e => setAge(e.target.value)} placeholder="Age" type="number"
                className="w-20 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-center focus:outline-none focus:border-purple-500 transition-colors" />
            </div>
            <select value={diet} onChange={e => setDiet(e.target.value)}
              className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-700 font-medium focus:outline-none focus:border-purple-500">
              <option value="None">No Diet Restriction</option>
              <option value="Vegan">Vegan</option>
              <option value="Keto">Keto</option>
              <option value="GF">Gluten Free</option>
            </select>
            <input value={preferences} onChange={e => setPreferences(e.target.value)} placeholder="Likes/Dislikes (e.g. 'Loves spicy', 'No cilantro')"
              className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-500" />
            <button className="w-full bg-purple-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-purple-200 active:scale-[0.99] transition-transform">
              Add Profile
            </button>
          </form>

          <div className="space-y-3 w-full pt-2">
            {familyMembers.length === 0 && (
              <div className="text-center py-10 text-slate-400">
                <Users className="w-16 h-16 mx-auto mb-4 text-slate-200" />
                <p>No profiles added yet.</p>
              </div>
            )}
            {familyMembers.map(m => (
              <div key={m.id} className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center w-full">
                <div>
                  <div className="font-bold text-slate-800 text-lg flex items-center gap-2">
                    {m.name}
                    <span className="bg-slate-100 text-slate-500 text-xs px-2 py-0.5 rounded-full font-bold">{m.age}</span>
                  </div>
                  <div className="text-sm text-purple-600 font-medium mt-1">{m.diet}</div>
                  {m.preferences && <div className="text-xs text-slate-400 mt-1 flex items-center gap-1"><ThumbsDown className="w-3 h-3" /> {m.preferences}</div>}
                </div>
                <button onClick={() => setFamilyMembers(familyMembers.filter(f => f.id !== m.id))}
                  className="p-3 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-xl transition-colors">
                  <Trash2 className="w-5 h-5" />
                </button>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const RecipeEngine = ({ apiKey, inventory, family, setSelectedRecipe, history, recipes, setRecipes, favorites, setFavorites }) => {
      const [loading, setLoading] = useState(false);
      const [activeTab, setActiveTab] = useState('generate');
      const [urlInput, setUrlInput] = useState('');
      const [mode, setMode] = useState('Standard');
      const [eaters, setEaters] = useState(family.map(f => f.id));

      const generate = async () => {
        if (inventory.length === 0) {
           alert("Your pantry is empty! Add items first.");
           return;
        }

        setLoading(true);
        try {
          const invStr = inventory.map(i => i.name).join(', ');
          const famStr = family.filter(f => eaters.includes(f.id)).map(f => `${f.name} (${f.diet}, Prefs: ${f.preferences || 'None'})`).join(', ');

          const prompt = `Act as chef. Inventory: [${invStr}]. People: [${famStr}]. Theme/URL: ${urlInput || mode}.
IMPORTANT: Return JSON.
CRITICAL RULE: You MUST return exactly 3 distinct recipe options.
In 'missing_ingredients' list specific items. 'total_amount_needed' field is MANDATORY for missing items.

JSON Structure:
{ "recipes": [{
  "id":"t","name":"...","time":"30m","description":"...",
  "ingredients":[{"item":"Chicken","qty":"2 lbs","have":true}],
  "missing_ingredients":[{"item":"Heavy Cream","total_amount_needed":"1 cup"}],
  "steps":["1"],"dietary_adaptations":"..."
}, { ... }, { ... }] }`;

          const res = await callGemini(apiKey, prompt);
          
          if (res.error) {
             throw new Error(res.message);
          }
          if (res.recipes) {
             setRecipes(res.recipes.map(r => ({ ...r, id: Math.random().toString(36).substr(2, 9) })));
          } else {
             throw new Error("AI did not
